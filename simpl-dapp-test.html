<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>SIMPL dApp Test</title>
    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        max-width: 760px;
        margin: 40px auto;
        padding: 24px;
        background: #f7f7f7;
      }
      button {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #ddd;
        background: white;
        cursor: pointer;
        font-size: 15px;
      }
      pre {
        background: #111;
        color: #0f0;
        padding: 16px;
        border-radius: 12px;
        min-height: 160px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>SIMPL dApp Test</h1>

    <button onclick="checkProvider()">Check provider</button>
    <button onclick="ethAccounts()">eth_accounts</button>
    <button onclick="requestAccounts()">eth_requestAccounts</button>
    <button onclick="chainId()">eth_chainId</button>
    <button onclick="switchEthereum()">Switch to Ethereum</button>
    <button onclick="switchBase()">Switch to Base</button>
    <button onclick="switchBsc()">Switch to BSC</button>
    <button onclick="personalSign()">personal_sign</button>
    <button onclick="sendZeroTx()">eth_sendTransaction: send 0 ETH to self</button>

    <pre id="log"></pre>

    <script>
      const logEl = document.getElementById("log");

      function log(title, value) {
        console.log(title, value);
        logEl.textContent += "\\n\\n" + title + "\\n" + JSON.stringify(value, null, 2);
      }

      function getProvider() {
        if (!window.ethereum) {
          throw new Error("window.ethereum not found");
        }
        return window.ethereum;
      }

      async function checkProvider() {
        try {
          const provider = getProvider();
          log("provider", {
            exists: !!provider,
            isMetaMask: provider.isMetaMask,
            selectedAddress: provider.selectedAddress,
            chainId: provider.chainId,
          });
        } catch (e) {
          log("provider error", {
            message: e.message,
            code: e.code,
          });
        }
      }

      async function ethAccounts() {
        try {
          const accounts = await getProvider().request({
            method: "eth_accounts",
          });
          log("eth_accounts", accounts);
        } catch (e) {
          log("eth_accounts error", {
            message: e.message,
            code: e.code,
          });
        }
      }

      async function requestAccounts() {
        try {
          const accounts = await getProvider().request({
            method: "eth_requestAccounts",
          });
          log("eth_requestAccounts", accounts);
        } catch (e) {
          log("eth_requestAccounts error", {
            message: e.message,
            code: e.code,
          });
        }
      }

      async function chainId() {
        try {
          const id = await getProvider().request({
            method: "eth_chainId",
          });
          log("eth_chainId", id);
        } catch (e) {
          log("eth_chainId error", {
            message: e.message,
            code: e.code,
          });
        }
      }

      async function switchEthereum() {
        try {
          const result = await getProvider().request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: "0x1" }],
          });
          log("switch Ethereum result", result);
        } catch (e) {
          log("switch Ethereum error", {
            message: e.message,
            code: e.code,
            data: e.data,
          });
        }
      }

      async function switchBase() {
        try {
          const result = await getProvider().request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: "0x2105" }],
          });
          log("switch Base result", result);
        } catch (e) {
          log("switch Base error", {
            message: e.message,
            code: e.code,
            data: e.data,
          });
        }
      }

      async function switchBsc() {
        try {
          const result = await getProvider().request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: "0x38" }],
          });
          log("switch BSC result", result);
        } catch (e) {
          log("switch BSC error", {
            message: e.message,
            code: e.code,
            data: e.data,
          });
        }
      }

      async function personalSign() {
        try {
          const accounts = await getProvider().request({
            method: "eth_requestAccounts",
          });

          const message = "SIMPL Wallet test signature";
          const hexMessage =
            "0x" + Array.from(new TextEncoder().encode(message))
              .map((b) => b.toString(16).padStart(2, "0"))
              .join("");

          const signature = await getProvider().request({
            method: "personal_sign",
            params: [hexMessage, accounts[0]],
          });

          log("personal_sign result", signature);
        } catch (e) {
          log("personal_sign error", {
            message: e.message,
            code: e.code,
            data: e.data,
          });
        }
      }

      async function sendZeroTx() {
        try {
          const accounts = await getProvider().request({
            method: "eth_requestAccounts",
          });

          const tx = {
            from: accounts[0],
            to: accounts[0],
            value: "0x0",
          };

          const result = await getProvider().request({
            method: "eth_sendTransaction",
            params: [tx],
          });

          log("eth_sendTransaction result", result);
        } catch (e) {
          log("eth_sendTransaction error", {
            message: e.message,
            code: e.code,
            data: e.data,
          });
        }
      }

      if (window.ethereum) {
        window.ethereum.on?.("accountsChanged", (accounts) => {
          log("event: accountsChanged", accounts);
        });

        window.ethereum.on?.("chainChanged", (chainId) => {
          log("event: chainChanged", chainId);
        });

        window.ethereum.on?.("connect", (info) => {
          log("event: connect", info);
        });

        window.ethereum.on?.("disconnect", (error) => {
          log("event: disconnect", error);
        });
      }
    </script>
  </body>
</html>
